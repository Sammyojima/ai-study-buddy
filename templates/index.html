<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Study Buddy</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
  <header>
    <h1>AI Study Buddy</h1>
    <p>Instantly generate flashcards from your study notes and unlock premium content!</p>
  </header>

  <!-- Registration & Login -->
  <section class="auth-section">
    <div class="auth-forms">
      <div class="form-box">
        <h3>Register</h3>
        <input type="email" id="regEmail" placeholder="Email" />
        <input type="password" id="regPassword" placeholder="Password" />
        <button id="registerBtn" class="btn">Register</button>
      </div>
      <div class="form-box">
        <h3>Login</h3>
        <input type="email" id="loginEmail" placeholder="Email" />
        <input type="password" id="loginPassword" placeholder="Password" />
        <button id="loginBtn" class="btn">Login</button>
      </div>
    </div>
  </section>

  <!-- Notes & Flashcards (hidden until login) -->
  <section class="notes-section" style="display:none;">
    <textarea id="notes" placeholder="Paste your study notes here..."></textarea>
    <div class="buttons">
      <button id="generateBtn" class="btn">Generate Flashcards</button>
      <button id="payButton" class="btn pay-btn">Pay Now to Unlock Premium Flashcards</button>
    </div>
    <div id="flashcards" class="flashcards-container"></div>
  </section>

  <footer>
    <p>&copy; 2025 AI Study Buddy | Designed for Students</p>
  </footer>

  <script type="module" src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
